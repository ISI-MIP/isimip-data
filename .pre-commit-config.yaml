# this file is updated using `pre-commit-update`

# do not touch the migration files at all: these are auto-generated by Django
exclude: \/migrations\/

repos:
- repo: meta
  hooks:
  - id: check-hooks-apply

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-ast
  - id: check-json
  - id: check-xml
  - id: check-yaml
  - id: end-of-file-fixer
    exclude: \.html$|\.sql$|\.svg$|\.txt$
  - id: trailing-whitespace
    exclude: \.sql$|\.svg$
  - id: debug-statements

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: aca6d4c8045a504e2812ea4bedff1d0a09e437bc  # frozen: v0.15.8
  hooks:
  - id: ruff-check
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format

- repo: https://github.com/crate-ci/typos
  rev: 5745f2a8dd91cd7b684680e2e10a2b388ba6e5cf  # frozen: v1
  hooks:
  - id: typos
    exclude: |
      (?x)^(
        config/settings/environments/.*|
        isimip_data/download/constants.py
      )$
